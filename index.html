<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <button onclick="toggleTheme()" style="position: fixed; top: 1rem; right: 2rem; z-index: 1000;">
            <label class="switch">
                <input type="checkbox" id="theme-toggle">
                <span class="slider"></span>
            </label>
        </button>
        <h1>NETFLIX</h1>
        <h2>Quem está assistindo?</h2>
        <ul class="profiles">
            <li onclick="selectProfile('Perfil 1', 'assets/Perfil-1.jpeg')"><img src="assets/Perfil-1.jpeg" alt="Perfil 1 avatar for Netflix user account selection screen"><p>Perfil 1</p></li>
            <li onclick="selectProfile('Perfil 2', 'assets/Perfil-2.jpeg')"><img src="assets/Perfil-2.jpeg" alt="Perfil 2 avatar for Netflix user account selection screen"><p>Perfil 2</p></li>
            <li onclick="selectProfile('Perfil 3', 'assets/perfil-3')"><img src="assets/perfil-3" alt="Perfil 3 avatar for Netflix user account selection screen"><p>Perfil 3</p></li>
            <li onclick="selectProfile('Perfil 4', 'assets/perfil-4.jpg')"><img src="assets/Perfil-4.jpg" alt="Perfil 4 avatar for Netflix user account selection screen"><p>Perfil 4</p></li>
        </ul>
        <h3 onclick="openProfileManager()">Gerenciar perfis</h3>
        
        <!-- Modal para gerenciar perfis -->
        <div id="profile-modal" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeProfileManager()">&times;</span>
                <h2>Gerenciar Perfis</h2>
                <div id="profile-list">
                    <!-- Perfis serão carregados aqui dinamicamente -->
                </div>
                <button id="add-profile-btn" onclick="addProfile()">Adicionar Perfil</button>
            </div>
        </div>
    </main>
    <script src="theme.js"></script>
    <!-- Script para seleção de perfil, navegação e gerenciador de perfis -->
    <script src="script.js"></script>
</body>

</html>
